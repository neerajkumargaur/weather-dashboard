      "@context": "https://schema.org",

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- ✅ CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ✅ GOOGLE ANALYTICS -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-01ZXSJ67FX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-01ZXSJ67FX');
    </script>

</head>

<body>

    <div class="bg-gradient"></div>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="app">

        <div id="navbar"></div>

        <main id="main-content" class="fade-in">

            <!-- ✅ ADD H1 FOR SEO -->
            <h1 style="position:absolute; left:-9999px;">
                Aero Weather Dashboard - Live Weather Updates and Forecast
            </h1>

            <div class="dashboard-grid">

                <div class="weather-hero">
                    <h2 class="weather-location" id="location">Loading...</h2>
                    <div class="temp-huge" id="temp">--°C</div>
                    <div class="weather-desc" id="condition">--</div>
                </div>

                <div class="stats-grid">

                    <div class="glass-card stat-card">
                        <div class="stat-icon">🌡</div>
                        <div class="stat-value" id="feels">--</div>
                        <div class="stat-label">Feels Like</div>
                    </div>

                    <div class="glass-card stat-card">
                        <div class="stat-icon">💧</div>
                        <div class="stat-value" id="humidity">--</div>
                        <div class="stat-label">Humidity</div>
                    </div>

                    <div class="glass-card stat-card">
                        <div class="stat-icon">💨</div>
                        <div class="stat-value" id="wind">--</div>
                        <div class="stat-label">Wind Speed</div>
                    </div>

                </div>

            </div>

        </main>

        <footer class="glass-footer">
            <p>&copy; 2026 Aero Weather Dashboard</p>
        </footer>

    </div>

   <script>
fetch("navbar.html")
    .then(res => res.text())
    .then(data => {
        document.getElementById("navbar").innerHTML = data;

        const currentPage = window.location.pathname.split("/").pop();

        document.querySelectorAll(".nav-item").forEach(link => {
            if (link.getAttribute("href") === currentPage) {
                link.classList.add("active");
            }
        });

        // ✅ ADD THIS (mobile toggle fix)
        const toggle = document.getElementById("menu-toggle");
        const menu = document.getElementById("nav-menu");

        if (toggle && menu) {
            toggle.addEventListener("click", () => {
                menu.classList.toggle("active");
            });
        }
    });
</script>

</body>

</html>
