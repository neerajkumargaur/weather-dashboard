<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- ✅ PRIMARY SEO -->
    <title>Aero Weather Dashboard | Real-Time Weather, Forecast & Climate Insights</title>

    <meta name="description"
        content="Get real-time weather updates including temperature, humidity, wind speed, and forecasts with Aero Weather Dashboard. Clean UI, fast updates, and accurate climate insights.">

    <meta name="keywords"
        content="weather dashboard, real-time weather, weather app, Bangalore weather, live forecast, meteorology, climate insights, Aero weather">

    <meta name="author" content="Aero Weather Team">
    <meta name="robots" content="index, follow">

    <!-- ✅ CANONICAL -->
    <link rel="canonical" href="https://yourdomain.com/index.html">

    <!-- ✅ VIEWPORT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ OPEN GRAPH (Facebook / LinkedIn) -->
    <meta property="og:title" content="Aero Weather Dashboard">
    <meta property="og:description"
        content="Check live weather conditions, temperature, humidity, and wind speed with a modern UI.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com">
    <meta property="og:image" content="https://yourdomain.com/preview.png">

    <!-- ✅ TWITTER SEO -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Aero Weather Dashboard">
    <meta name="twitter:description" content="Real-time weather updates with modern UI.">
    <meta name="twitter:image" content="https://yourdomain.com/preview.png">

    <!-- ✅ FAVICON -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- ✅ PRELOAD FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- ✅ STRUCTURED DATA (VERY IMPORTANT) -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Aero Weather Dashboard",
  "url": "https://yourdomain.com",
  "description": "Real-time weather dashboard with accurate forecasts and climate insights.",
  "applicationCategory": "WeatherApplication",
  "operatingSystem": "All",
  "author": {
    "@type": "Organization",
    "name": "Aero Weather"
  }
}
</script>

</head>

<body>

    <div class="bg-gradient"></div>

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="app">

        <div id="navbar"></div>

        <main id="main-content" class="fade-in">

            <!-- ✅ ADD H1 FOR SEO -->
            <h1 style="position:absolute; left:-9999px;">
                Aero Weather Dashboard - Live Weather Updates and Forecast
            </h1>

            <div class="dashboard-grid">

                <div class="weather-hero">
                    <h2 class="weather-location" id="location">Loading...</h2>
                    <div class="temp-huge" id="temp">--°C</div>
                    <div class="weather-desc" id="condition">--</div>
                </div>

                <div class="stats-grid">

                    <div class="glass-card stat-card">
                        <div class="stat-icon">🌡</div>
                        <div class="stat-value" id="feels">--</div>
                        <div class="stat-label">Feels Like</div>
                    </div>

                    <div class="glass-card stat-card">
                        <div class="stat-icon">💧</div>
                        <div class="stat-value" id="humidity">--</div>
                        <div class="stat-label">Humidity</div>
                    </div>

                    <div class="glass-card stat-card">
                        <div class="stat-icon">💨</div>
                        <div class="stat-value" id="wind">--</div>
                        <div class="stat-label">Wind Speed</div>
                    </div>

                </div>

            </div>

        </main>

        <footer class="glass-footer">
            <p>&copy; 2026 Aero Weather Dashboard</p>
        </footer>

    </div>

    <script>

        /* NAVBAR */
        fetch("navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const currentPage = window.location.pathname.split("/").pop();

                document.querySelectorAll(".nav-item").forEach(link => {
                    if (link.getAttribute("href") === currentPage) {
                        link.classList.add("active");
                    }
                });
            });


        /* WEATHER MAP */
        const WMO_CODES = {
            0: { desc: 'Clear sky', icon: '☀️' },
            1: { desc: 'Mainly clear', icon: '🌤' },
            2: { desc: 'Partly cloudy', icon: '⛅' },
            3: { desc: 'Overcast', icon: '☁️' },
            45: { desc: 'Fog', icon: '🌫' },
            61: { desc: 'Rain', icon: '🌧' },
            63: { desc: 'Moderate rain', icon: '🌧' },
            65: { desc: 'Heavy rain', icon: '🌧' },
            71: { desc: 'Snow', icon: '❄️' },
            95: { desc: 'Thunderstorm', icon: '⛈' }
        };


        /* WEATHER */
        async function loadWeather() {
            try {
                const res = await fetch(
                    "https://api.open-meteo.com/v1/forecast?latitude=12.97&longitude=77.59&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m"
                );

                const data = await res.json();
                const w = data.current;

                const info = WMO_CODES[w.weather_code] || { desc: "Unknown", icon: "🌍" };

                document.getElementById("location").innerText = "Bangalore, India";
                document.getElementById("temp").innerText = Math.round(w.temperature_2m) + "°C";
                document.getElementById("feels").innerText = Math.round(w.apparent_temperature) + "°C";
                document.getElementById("humidity").innerText = w.relative_humidity_2m + "%";
                document.getElementById("wind").innerText = w.wind_speed_10m + " km/h";

                document.getElementById("condition").innerText =
                    info.icon + " " + info.desc;

            } catch {
                document.getElementById("location").innerText = "Failed to load weather";
            }
        }

        loadWeather();

    </script>

</body>

</html>
